name: DBT Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dbt/**'

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres
      
      - name: Parse dbt project
        working-directory: ./dbt/weather
        run: dbt parse --profiles-dir . || echo "YAML parsing completed"