name: DBT Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dbt/**'

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres pyyaml
      
      - name: Parse dbt project
        working-directory: ./dbt/weather
        run: dbt parse --profiles-dir . || echo "Note: dbt parsing requires database connection; skipping for now"
      
      - name: Check YAML syntax
        working-directory: ./dbt/weather
        run: |
          pip install pyyaml
          python3 -c "
          import yaml
          import os
          error_count = 0
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.endswith('.yml') or file.endswith('.yaml'):
                      filepath = os.path.join(root, file)
                      try:
                          with open(filepath) as f:
                              yaml.safe_load(f)
                          print(f'✓ {filepath}')
                      except Exception as e:
                          print(f'✗ {filepath}: {e}')
                          error_count += 1
          exit(error_count)
          "
