name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  notify-render:
    name: Trigger Render API Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        run: |
          curl --request POST \
            --url "https://api.render.com/deploy/srv-${{ secrets.RENDER_API_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}" \
            --header 'accept: application/json'

  notify-vercel:
    name: Check Frontend Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check for frontend changes
        id: changes
        run: |
          if git diff --name-only HEAD~1..HEAD | grep -q "^frontend/"; then
            echo "frontend_changed=true" >> $GITHUB_OUTPUT
            echo "Frontend changes detected — Vercel will auto-deploy via GitHub integration"
          else
            echo "No frontend changes detected"
          fi