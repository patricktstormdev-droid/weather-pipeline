name: Frontend Tests & Lint

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install
        
      - name: Check lint script exists
        working-directory: ./frontend
        run: |
          npm run lint --if-present || echo "No lint script found, skipping"
      
      - name: Lint with ESLint
        working-directory: ./frontend
        run: npm run lint
      
      - name: Build for production
        working-directory: ./frontend
        env:
          VITE_API_URL: https://weather-api-dummy.onrender.com
        run: npm run build
      
      - name: Check build output
        working-directory: ./frontend
        run: |
          if [ -d "dist" ]; then
            echo "✓ Build successful. dist/ directory contains $(find dist -type f | wc -l) files"
          else
            echo "✗ Build failed. dist/ directory not found"
            exit 1
          fi
